paths:
  scene_dir: "data/train/florian/"
  runs_root: "data/train/florian/sweep_runs"   # optional

wandb:
  project: "vton_pipeline"
  run_name: "vton_florian_16"
  mode: "online"

pipeline:
  steps:
    extract_frames: true
    vggt: false
    qwen: true
    gsplat: true
  input_mirror: "copy"


extract_frames:
  videos_dir: "video"
  video_name: "florian_shirt.MOV"        # optional: if not specified, process first video in videos_dir
  num_frames: 6
  start: 0
  end: null
  ext: "png"
  rotate: 90
  overwrite: true
  clear_output_dir: true

vggt:
  use_ba: false
  max_reproj_error: 8.0
  shared_camera: false
  camera_type: "SIMPLE_PINHOLE"
  vis_thresh: 0.2
  query_frame_num: 8
  max_query_pts: 4096
  fine_tracking: true
  conf_thres_value: 5.0
  keep_top_percent: 0.2
  seed: 42

qwen:
  #qwen model
  model_path: "ovedrive/Qwen-Image-Edit-2511-4bit"
  clothing_image: "data/clothing/train/upper/short/shirts/white_plants_shirt.jpg"
  prompt: "Replace the person's original clothing with the clothing image. Do not invent new features. Keep the person identical: pose, body, face, hair, and background must remain unchanged."
  negative_prompt: "change pose"
  # Diffusion parameters
  true_cfg_scale: 4.0
  num_inference_steps: 20
  seed: 0
  # File extensions for images in <scene_dir>/real/images/
  extensions: [".jpg", ".jpeg", ".png"]

gsplat:
  test_every: 8
  data_factor: 1
  tile_size: 8
  max_steps: 30_000
  disable_video: true
  disable_viewer: true
  eval_steps:
    - 2000
    - 5000
    - 10000
    - 15000
    - 20000
    - 25000
    - 30000

