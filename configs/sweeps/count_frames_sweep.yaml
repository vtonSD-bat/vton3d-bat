# configs/sweeps/frames_count_sweep.yaml
program: -m vton3d.pipeline.run_sweep
method: grid

metric:
  name: vggt/psnr_mean
  goal: maximize

parameters:
  extract_frames.num_frames:
    values: [5, 6, 7, 8, 10, 12, 14, 16, 18, 20, 24, 28, 32, 36, 40, 50, 60, 70, 80, 100]

command:
  - ${env}
  - ${interpreter}
  - -m
  - vton3d.pipeline.run_sweep
  - --config
  - configs/vton_pipeline.yaml
